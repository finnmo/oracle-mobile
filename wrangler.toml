name = "oracle"
main = "worker/index.ts"
compatibility_date = "2025-01-01"

[assets]
directory = "./dist"
binding = "ASSETS"

[[d1_databases]]
binding = "DB"
database_name = "oracle-db"
database_id = "945829fe-613d-4678-a22f-96fd747dadf1"

[vars]
# Set ADMIN_API_TOKEN via: wrangler secret put ADMIN_API_TOKEN

[triggers]
# Max 5 crons on many Cloudflare plans — use comma-separated weekdays (0=Sun).
# Perth UTC+8: Thu/Fri 03:45 & 04:20 UTC ≈ late morning announce / ratings open.
# Close uses D1 rateCloseAtUtc; Fri+Sat 15:59 UTC covers both anchor types.
crons = [
  "45 3 * * 4,5",
  "20 4 * * 4,5",
  "59 15 * * 5,6",
]
