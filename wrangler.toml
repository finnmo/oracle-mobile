name = "oracle"
main = "worker/index.ts"
compatibility_date = "2025-01-01"

[assets]
directory = "./dist"
binding = "ASSETS"

[[d1_databases]]
binding = "DB"
database_name = "oracle-db"
database_id = "945829fe-613d-4678-a22f-96fd747dadf1"

[vars]
# Set ADMIN_API_TOKEN via: wrangler secret put ADMIN_API_TOKEN

[triggers]
crons = [
  "45 3 * * 6",  # Friday 03:45 UTC = Friday 11:45 Perth — announce pub (if not already chosen)
  "20 4 * * 6",  # Friday 04:20 UTC = Friday 12:20 Perth — open ratings
  "59 15 * * 7"  # Saturday 15:59 UTC = Friday 23:59 Perth — close ratings
]
