name = "oracle"
main = "worker/index.ts"
compatibility_date = "2025-01-01"

[assets]
directory = "./dist"
binding = "ASSETS"

[[d1_databases]]
binding = "DB"
database_name = "oracle-db"
database_id = "YOUR_D1_DATABASE_ID"

[vars]
# Set ADMIN_API_TOKEN via: wrangler secret put ADMIN_API_TOKEN

[triggers]
crons = [
  "0 2 * * 5",   # Friday 02:00 UTC = Friday 10:00 Perth — announce pub
  "20 4 * * 5",  # Friday 04:20 UTC = Friday 12:20 Perth — open ratings
  "59 15 * * 6"  # Saturday 15:59 UTC = Friday 23:59 Perth — close ratings
]
